<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AgriSmart Pro | نظام التسميد المخصص</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        :root {
            --primary: #1a5f3e; --primary-dark: #0d3d26; --secondary: #ff9800;
            --success: #4caf50; --danger: #f44336; --warning: #ffc107;
            --light: #f8fafc; --gray: #6c757d; --gray-light: #e9ecef;
            --radius: 20px; --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        body { background: var(--light); color: #1e1e2f; line-height: 1.5; }
        .navbar { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; color: white; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem 5%; }
        .card { background: white; border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); border: 1px solid var(--gray-light); }
        .card-title { font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.6rem; border-right: 5px solid var(--secondary); padding-right: 0.8rem; }
        .form-group { margin-bottom: 1rem; }
        .form-control { width: 100%; padding: 0.8rem; border: 1px solid var(--gray-light); border-radius: 12px; font-size: 1rem; background: var(--light); transition: 0.3s; }
        .form-control:focus { border-color: var(--secondary); outline: none; background: white; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .btn-calculate { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; padding: 1rem; border-radius: 40px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1.1rem; margin-top: 1rem; transition: 0.3s; }
        .btn-calculate:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(26, 95, 62, 0.3); }
        
        /* تصميم الفاتورة والنتائج */
        .invoice-card { background: #fff; border: 2px dashed var(--primary); border-radius: 15px; padding: 1.5rem; margin-top: 1.5rem; }
        .item-row { display: flex; justify-content: space-between; padding: 0.8rem 0; border-bottom: 1px solid var(--gray-light); }
        .total-box { background: var(--primary); color: white; padding: 1rem; border-radius: 12px; text-align: center; font-size: 1.5rem; font-weight: 800; margin-top: 1rem; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .badge-n { background: #e3f2fd; color: #1565c0; }
        .badge-p { background: #fbe9e7; color: #d84315; }
        .badge-k { background: #f1f8e9; color: #33691e; }

        @media (max-width: 768px) { .row-2, .row-3 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="navbar">
    <div style="font-size: 1.5rem; font-weight: 800;"><i class="fas fa-microscope"></i> AgriSmart <span style="color:var(--secondary)">LABS</span></div>
    <div>وحدة تصنيع الأسمدة المخصصة</div>
</div>

<div class="container">
    <div class="card">
        <div class="card-title">1. بيانات المحصول والمساحة</div>
        <div class="row-2">
            <div class="form-group">
                <label>نوع المحصول</label>
                <select id="cropSelect" class="form-control" onchange="updateInfo()">
                    <option value="طماطم">طماطم</option>
                    <option value="بطاطا">بطاطا</option>
                    <option value="قمح">قمح</option>
                    <option value="أشجار مثمرة">أشجار مثمرة</option>
                </select>
            </div>
            <div class="form-group">
                <label>المساحة (هكتار)</label>
                <input type="number" id="area" class="form-control" value="1" step="0.1">
            </div>
        </div>

        <div class="card-title" style="margin-top:1rem;">2. نتائج تحليل التربة الحالية (PPM)</div>
        <div class="row-3">
            <div class="form-group">
                <label>نيتروجين (N)</label>
                <input type="number" id="soilN" class="form-control" value="30">
            </div>
            <div class="form-group">
                <label>فوسفور (P)</label>
                <input type="number" id="soilP" class="form-control" value="20">
            </div>
            <div class="form-group">
                <label>بوتاسيوم (K)</label>
                <input type="number" id="soilK" class="form-control" value="150">
            </div>
        </div>

        <button class="btn-calculate" onclick="generateFertilizerPlan()">
            <i class="fas fa-blender"></i> تحليل التربة وتركيب السماد المخصص
        </button>
    </div>

    <div id="resultSection" style="display:none;">
        </div>
</div>

<script>
// قاعدة بيانات المحاصيل والأسعار التقريبية (بالدينار الجزائري)
const DB = {
    crops: {
        "طماطم": { targetN: 200, targetP: 80, targetK: 300, yield: 80 },
        "بطاطا": { targetN: 180, targetP: 70, targetK: 350, yield: 70 },
        "قمح": { targetN: 120, targetP: 60, targetK: 100, yield: 12 },
        "أشجار مثمرة": { targetN: 150, targetP: 50, targetK: 250, yield: 40 }
    },
    prices: {
        N: 95, // دج للكيلو (يوريا 46%)
        P: 110, // دج للكيلو (سوبر فوسفات)
        K: 140  // دج للكيلو (كبريتات البوتاسيوم)
    }
};

function generateFertilizerPlan() {
    const cropName = document.getElementById('cropSelect').value;
    const area = parseFloat(document.getElementById('area').value);
    const crop = DB.crops[cropName];

    // تحويل PPM في التربة إلى كغ/هكتار (تقريبياً: ppm * 2.4 لعمق 20 سم)
    const currentN = parseFloat(document.getElementById('soilN').value) * 2.4;
    const currentP = parseFloat(document.getElementById('soilP').value) * 2.4;
    const currentK = parseFloat(document.getElementById('soilK').value) * 2.4;

    // حساب العجز لكل عنصر (كغ للهكتار الواحد)
    const diffN = Math.max(0, crop.targetN - currentN);
    const diffP = Math.max(0, crop.targetP - currentP);
    const diffK = Math.max(0, crop.targetK - currentK);

    // حساب الكمية الإجمالية للمساحة المحددة وتكلفتها
    const totalN_kg = diffN * area;
    const totalP_kg = diffP * area;
    const totalK_kg = diffK * area;

    const costN = totalN_kg * DB.prices.N;
    const costP = totalP_kg * DB.prices.P;
    const costK = totalK_kg * DB.prices.K;
    
    const totalWeight = totalN_kg + totalP_kg + totalK_kg;
    const totalCost = costN + costP + costK;

    // عرض النتائج
    const res = document.getElementById('resultSection');
    res.style.display = 'block';
    res.innerHTML = `
        <div class="card invoice-card">
            <div class="card-title" style="color:var(--primary-dark)">
                <i class="fas fa-file-invoice-dollar"></i> فاتورة السماد المخصص للمساحة (${area} هكتار)
            </div>
            
            <p style="margin-bottom:1rem; color:var(--gray)">بناءً على تحليل مختبرنا، يحتاج محصول <strong>${cropName}</strong> للتركيبة التالية لسد العجز في تربتك:</p>
            
            <div class="item-row">
                <span><span class="badge badge-n">N</span> كمية النيتروجين المطلوبة:</span>
                <strong>${totalN_kg.toFixed(1)} كغ</strong>
            </div>
            <div class="item-row">
                <span><span class="badge badge-p">P</span> كمية الفوسفور المطلوبة:</span>
                <strong>${totalP_kg.toFixed(1)} كغ</strong>
            </div>
            <div class="item-row">
                <span><span class="badge badge-k">K</span> كمية البوتاسيوم المطلوبة:</span>
                <strong>${totalK_kg.toFixed(1)} كغ</strong>
            </div>

            <div class="item-row" style="border:none; margin-top:1rem; background:#f9f9f9; padding:10px; border-radius:8px;">
                <span><i class="fas fa-weight-hanging"></i> الوزن الإجمالي للطلبية:</span>
                <strong>${(totalWeight/1000).toFixed(2)} طن</strong>
            </div>

            <div class="total-box">
                <div style="font-size:0.9rem; font-weight:300; opacity:0.9;">التكلفة الإجمالية لسمادك المخصص</div>
                ${totalCost.toLocaleString()} دج
            </div>

            <div style="margin-top:1.5rem; font-size:0.85rem; color:var(--primary); text-align:center;">
                <i class="fas fa-info-circle"></i> ملاحظة: هذه الخلطة مصنعة خصيصاً لتعويض النقص في العناصر الأساسية لضمان وصول مردودك إلى <strong>${crop.yield * area} طن</strong> للمساحة المحددة.
            </div>
            
            <button class="btn-calculate" style="background:var(--secondary); margin-top:1rem;" onclick="alert('تم إرسال الطلب إلى خط الإنتاج بمصنعنا')">
                <i class="fas fa-truck-loading"></i> تأكيد الطلب وإرسال للمصنع
            </button>
        </div>
    `;
    res.scrollIntoView({behavior:'smooth'});
}
</script>

</body>
</html>
