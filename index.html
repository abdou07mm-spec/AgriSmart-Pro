<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AgriSmart Pro | Advanced Crop Growth Modeling</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        :root {
            --primary: #1a5f3e; --primary-dark: #0d3d26; --secondary: #ff9800;
            --success: #4caf50; --danger: #f44336; --warning: #ffc107; --info: #2196f3;
            --light: #f8fafc; --gray: #6c757d; --gray-light: #e9ecef;
            --radius: 20px; --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        body { background: var(--light); color: #1e1e2f; line-height: 1.5; }
        .navbar { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; flex-wrap: wrap; gap: 0.5rem; }
        .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.4rem; font-weight: 700; color: white; }
        .logo span { color: var(--secondary); }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 5%; }
        .card { background: white; border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); }
        .card-title { font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; border-right: 4px solid var(--secondary); padding-right: 0.8rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 600; }
        .form-control { width: 100%; padding: 0.8rem; border: 1px solid var(--gray-light); border-radius: 12px; font-size: 1rem; background: var(--light); }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .row-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
        .btn-primary { background: linear-gradient(135deg, var(--secondary), #f57c00); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 40px; font-weight: 600; cursor: pointer; width: 100%; font-size: 1rem; transition: transform 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); }
        .result-card { background: linear-gradient(135deg, #f5f5f5, #fff); border-radius: var(--radius); padding: 1.5rem; margin-top: 1rem; border: 1px solid var(--gray-light); }
        .result-value { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .soil-badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .good { background: #c8e6c9; color: #2e7d32; }
        .medium { background: #fff3e0; color: #f57c00; }
        .bad { background: #ffcdd2; color: #c62828; }
        .progress-bar { height: 8px; background: var(--gray-light); border-radius: 10px; overflow: hidden; margin: 0.5rem 0; }
        .progress-fill { height: 100%; background: var(--secondary); border-radius: 10px; transition: width 0.5s; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 0.6rem 1.5rem; border-radius: 50px; display: none; z-index: 3000; font-size: 0.9rem; }
        .crop-search { position: relative; }
        .crop-list { max-height: 200px; overflow-y: auto; position: absolute; background: white; border: 1px solid var(--gray-light); border-radius: 12px; width: 100%; z-index: 100; display: none; box-shadow: var(--shadow); }
        .crop-item { padding: 0.5rem; cursor: pointer; border-bottom: 1px solid var(--gray-light); }
        .crop-item:hover { background: var(--gray-light); }
        .chart-container { height: 280px; margin: 1rem 0; }
        .formula-box { background: var(--gray-light); padding: 1rem; border-radius: 12px; font-family: monospace; text-align: center; margin: 1rem 0; direction: ltr; }
        @media (max-width: 700px) { .row-2, .row-3, .row-4 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo"><i class="fas fa-seedling"></i> Agri<span>Smart</span> Pro</div>
    <div style="display: flex; gap: 1rem;">
        <button class="btn-primary" style="background: rgba(255,255,255,0.2); padding: 0.4rem 1rem;" onclick="document.getElementById('tab-analysis').scrollIntoView({behavior:'smooth'})">تحليل التربة</button>
        <button class="btn-primary" style="background: rgba(255,255,255,0.2); padding: 0.4rem 1rem;" onclick="document.getElementById('tab-results').scrollIntoView({behavior:'smooth'})">النتائج</button>
    </div>
</div>

<div class="container">
    <!-- قسم الإدخال -->
    <div class="card" id="tab-analysis">
        <div class="card-title"><i class="fas fa-microscope"></i> تحليل التربة المتقدم - نمذجة نمو المحاصيل</div>
        
        <div class="formula-box">
            <strong>Y<sub>actual</sub> = Y<sub>max</sub> × f(Nutrients) × f(Water) × f(Soil condition)</strong><br>
            <small style="font-size: 0.8rem;">المردود الفعلي = المردود الأقصى × معامل العناصر × معامل الماء × معامل التربة</small>
        </div>

        <div class="row-2">
            <div class="form-group crop-search">
                <label><i class="fas fa-leaf"></i> نوع المحصول</label>
                <input type="text" id="cropName" class="form-control" placeholder="طماطم, بطاطا, قمح..." oninput="filterCrops()" value="طماطم">
                <div id="cropList" class="crop-list"></div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-vector-square"></i> المساحة</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="number" id="area" class="form-control" value="1" style="flex:2;">
                    <select id="areaUnit" class="form-control" style="flex:1;"><option value="hectare">هكتار</option><option value="m2">م²</option></select>
                </div>
            </div>
        </div>

        <div class="card-title" style="margin-top: 1rem;"><i class="fas fa-flask"></i> تحليل التربة (ppm)</div>
        <div class="row-4">
            <div class="form-group"><label>النيتروجين N</label><input type="number" id="N" class="form-control" value="42"></div>
            <div class="form-group"><label>الفوسفور P</label><input type="number" id="P" class="form-control" value="28"></div>
            <div class="form-group"><label>البوتاسيوم K</label><input type="number" id="K" class="form-control" value="110"></div>
            <div class="form-group"><label>الكالسيوم Ca</label><input type="number" id="Ca" class="form-control" value="380"></div>
            <div class="form-group"><label>المغنيسيوم Mg</label><input type="number" id="Mg" class="form-control" value="110"></div>
            <div class="form-group"><label>الكبريت S</label><input type="number" id="S" class="form-control" value="28"></div>
            <div class="form-group"><label>درجة الحموضة pH</label><input type="number" step="0.1" id="pH" class="form-control" value="6.8"></div>
            <div class="form-group"><label>الملوحة EC (mS/cm)</label><input type="number" step="0.1" id="EC" class="form-control" value="1.4"></div>
        </div>

        <div class="card-title" style="margin-top: 1rem;"><i class="fas fa-water"></i> الموارد المائية</div>
        <div class="row-2">
            <div class="form-group"><label>كمية الماء المتاحة</label><div style="display: flex; gap: 0.5rem;"><input type="number" id="waterAmount" class="form-control" value="5000"><select id="waterUnit" class="form-control"><option value="m3">م³</option><option value="liter">لتر</option></select><select id="waterPeriod" class="form-control"><option value="season">في الموسم</option><option value="month">شهرياً</option><option value="week">أسبوعياً</option></select></div></div>
            <div class="form-group"><label>الاحتياج المائي للمحصول (م³/هكتار/موسم)</label><input type="number" id="cropWaterNeed" class="form-control" placeholder="تلقائي" readonly style="background:#e9ecef;"></div>
        </div>

        <button class="btn-primary" onclick="calculateAdvancedYield()"><i class="fas fa-calculator"></i> حساب المردود المتقدم</button>
    </div>

    <!-- قسم النتائج -->
    <div id="resultsArea" style="display: none;"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== قاعدة بيانات المحاصيل ====================
const CropDatabase = {
    "طماطم": { name: "طماطم", maxYieldTonPerHa: 80, waterNeed_m3_per_ha: 5000, nutrientPerTon: { N: 2.5, P: 0.8, K: 3.5, Ca: 1.2, Mg: 0.4, S: 0.3 }, idealPH: { min: 6.0, max: 6.8 }, idealEC: { min: 1.2, max: 2.0 }, penaltyPH: 0.25, penaltyEC: 0.15 },
    "بطاطا": { name: "بطاطا", maxYieldTonPerHa: 70, waterNeed_m3_per_ha: 4500, nutrientPerTon: { N: 2.2, P: 0.6, K: 4.5, Ca: 0.8, Mg: 0.4, S: 0.3 }, idealPH: { min: 5.5, max: 6.5 }, idealEC: { min: 1.0, max: 1.8 }, penaltyPH: 0.30, penaltyEC: 0.15 },
    "قمح": { name: "قمح", maxYieldTonPerHa: 12, waterNeed_m3_per_ha: 3500, nutrientPerTon: { N: 2.0, P: 0.5, K: 2.5, Ca: 0.5, Mg: 0.3, S: 0.2 }, idealPH: { min: 6.0, max: 7.5 }, idealEC: { min: 1.0, max: 1.6 }, penaltyPH: 0.20, penaltyEC: 0.20 },
    "فلفل": { name: "فلفل", maxYieldTonPerHa: 60, waterNeed_m3_per_ha: 4500, nutrientPerTon: { N: 3.0, P: 1.0, K: 4.0, Ca: 1.0, Mg: 0.5, S: 0.4 }, idealPH: { min: 6.2, max: 7.0 }, idealEC: { min: 1.0, max: 1.8 }, penaltyPH: 0.25, penaltyEC: 0.15 },
    "خيار": { name: "خيار", maxYieldTonPerHa: 100, waterNeed_m3_per_ha: 5500, nutrientPerTon: { N: 2.8, P: 1.2, K: 4.2, Ca: 1.5, Mg: 0.6, S: 0.5 }, idealPH: { min: 6.0, max: 7.0 }, idealEC: { min: 1.2, max: 2.0 }, penaltyPH: 0.20, penaltyEC: 0.15 },
    "ذرة": { name: "ذرة", maxYieldTonPerHa: 15, waterNeed_m3_per_ha: 6000, nutrientPerTon: { N: 2.5, P: 1.0, K: 3.0, Ca: 0.6, Mg: 0.4, S: 0.3 }, idealPH: { min: 5.8, max: 7.0 }, idealEC: { min: 1.0, max: 2.0 }, penaltyPH: 0.25, penaltyEC: 0.20 },
    "تفاح": { name: "تفاح", maxYieldTonPerHa: 60, waterNeed_m3_per_ha: 7000, nutrientPerTon: { N: 1.5, P: 0.5, K: 2.0, Ca: 1.0, Mg: 0.3, S: 0.2 }, idealPH: { min: 6.0, max: 7.0 }, idealEC: { min: 1.0, max: 1.8 }, penaltyPH: 0.20, penaltyEC: 0.15 },
    "برتقال": { name: "برتقال", maxYieldTonPerHa: 50, waterNeed_m3_per_ha: 8000, nutrientPerTon: { N: 2.0, P: 0.6, K: 3.0, Ca: 1.0, Mg: 0.4, S: 0.3 }, idealPH: { min: 5.5, max: 6.5 }, idealEC: { min: 1.0, max: 1.8 }, penaltyPH: 0.25, penaltyEC: 0.15 }
};

// ==================== الخوارزميات ====================

// 1. تحويل PPM إلى كغ/هكتار (عمق 20 سم، كثافة 1.2)
function ppmToKgHa(ppm) { return ppm * 2.4; }

// 2. معامل العناصر الغذائية (قانون ليبج)
function calculateNutrientFactor(soil, crop) {
    let factors = [];
    for (let nutrient of ['N', 'P', 'K', 'Ca', 'Mg', 'S']) {
        let available = ppmToKgHa(soil[nutrient] || 0);
        let requiredPerTon = crop.nutrientPerTon[nutrient] || 0;
        let requiredForMax = requiredPerTon * crop.maxYieldTonPerHa;
        let ratio = Math.min(1, available / requiredForMax);
        factors.push(ratio);
    }
    let limitingFactor = Math.min(...factors);
    return { nutrientFactor: limitingFactor, limitingElement: ['N','P','K','Ca','Mg','S'][factors.indexOf(limitingFactor)] };
}

// 3. معامل الماء (Water Use Efficiency)
function calculateWaterFactor(waterAvailable_m3, waterNeed_m3) {
    if (waterNeed_m3 <= 0) return 1;
    let ratio = waterAvailable_m3 / waterNeed_m3;
    if (ratio >= 1) return 1;
    // خصم أكبر من نسبة النقص بسبب الإجهاد المائي
    return Math.pow(ratio, 1.2);
}

// 4. معامل التربة (pH و EC)
function calculateSoilConditionFactor(crop, pH, EC) {
    let factor = 1;
    // خصم pH
    if (pH < crop.idealPH.min) factor -= (crop.idealPH.min - pH) * crop.penaltyPH;
    else if (pH > crop.idealPH.max) factor -= (pH - crop.idealPH.max) * crop.penaltyPH;
    // خصم EC
    if (EC < crop.idealEC.min) factor -= (crop.idealEC.min - EC) * crop.penaltyEC;
    else if (EC > crop.idealEC.max) factor -= (EC - crop.idealEC.max) * crop.penaltyEC;
    return Math.max(0.2, Math.min(1, factor));
}

// 5. حساب المردود الفعلي
function calculateActualYield(crop, area_ha, nutrientFactor, waterFactor, soilFactor) {
    let Ymax = crop.maxYieldTonPerHa * area_ha;
    return Ymax * nutrientFactor * waterFactor * soilFactor;
}

// 6. حساب الفجوة والسماد المطلوب
function calculateFertilizerGap(soil, crop, area_ha) {
    let gaps = [];
    for (let nutrient of ['N', 'P', 'K']) {
        let available = ppmToKgHa(soil[nutrient] || 0);
        let requiredForMax = (crop.nutrientPerTon[nutrient] || 0) * crop.maxYieldTonPerHa * area_ha;
        let deficit = Math.max(0, requiredForMax - available);
        if (deficit > 0) {
            let fertilizerKg = deficit / (nutrient === 'N' ? 0.46 : nutrient === 'P' ? 0.18 : 0.5);
            gaps.push({ nutrient, deficit: deficit.toFixed(0), fertilizerKg: Math.ceil(fertilizerKg), cost: Math.ceil(fertilizerKg * (nutrient === 'N' ? 80 : nutrient === 'P' ? 70 : 90)) });
        }
    }
    return gaps;
}

// ==================== الدالة الرئيسية ====================
function calculateAdvancedYield() {
    let cropName = document.getElementById('cropName').value;
    let crop = CropDatabase[cropName];
    if (!crop) { showToast('⚠️ المحصول غير موجود'); return; }

    // قراءة المدخلات
    let areaValue = parseFloat(document.getElementById('area').value);
    let areaUnit = document.getElementById('areaUnit').value;
    let area_ha = areaUnit === 'hectare' ? areaValue : areaValue / 10000;

    let soil = {
        N: parseFloat(document.getElementById('N').value) || 0,
        P: parseFloat(document.getElementById('P').value) || 0,
        K: parseFloat(document.getElementById('K').value) || 0,
        Ca: parseFloat(document.getElementById('Ca').value) || 0,
        Mg: parseFloat(document.getElementById('Mg').value) || 0,
        S: parseFloat(document.getElementById('S').value) || 0
    };
    let pH = parseFloat(document.getElementById('pH').value) || 7;
    let EC = parseFloat(document.getElementById('EC').value) || 1.4;

    let waterAmount = parseFloat(document.getElementById('waterAmount').value);
    let waterUnit = document.getElementById('waterUnit').value;
    let waterPeriod = document.getElementById('waterPeriod').value;
    let water_m3 = waterUnit === 'liter' ? waterAmount / 1000 : waterAmount;
    let waterNeed = crop.waterNeed_m3_per_ha * area_ha;
    if (waterPeriod === 'month') waterNeed /= 3;
    if (waterPeriod === 'week') waterNeed /= 12;

    // حساب المعاملات
    let { nutrientFactor, limitingElement } = calculateNutrientFactor(soil, crop);
    let waterFactor = calculateWaterFactor(water_m3, waterNeed);
    let soilFactor = calculateSoilConditionFactor(crop, pH, EC);

    // حساب المردود
    let currentYield = calculateActualYield(crop, area_ha, nutrientFactor, waterFactor, soilFactor);
    
    // حساب المردود بعد إضافة السماد المخصص (رفع nutrientFactor إلى 1)
    let potentialYield = calculateActualYield(crop, area_ha, 1, waterFactor, soilFactor);
    let gain = potentialYield - currentYield;
    let gainPercent = currentYield > 0 ? (gain / currentYield * 100).toFixed(1) : 100;
    
    // حساب السماد المطلوب لسد الفجوة
    let fertilizerGaps = calculateFertilizerGap(soil, crop, area_ha);
    let totalFertilizerCost = fertilizerGaps.reduce((sum, g) => sum + g.cost, 0);

    // عرض النتائج
    let resultsHtml = `
        <div class="card" id="tab-results">
            <div class="card-title"><i class="fas fa-chart-line"></i> 📊 نتائج نمذجة نمو المحصول - ${crop.name}</div>
            
            <div class="result-card">
                <h3>🌾 المردود المتوقع</h3>
                <div class="row-2">
                    <div style="text-align:center; padding:1rem; background:#f5f5f5; border-radius:16px;">
                        <div>الوضع الحالي (بدون تحسين)</div>
                        <div class="result-value">${currentYield.toFixed(1)} <span style="font-size:1rem;">طن</span></div>
                        <div>≈ ${(currentYield * 35000).toLocaleString()} دج</div>
                    </div>
                    <div style="text-align:center; padding:1rem; background:#e8f5e9; border-radius:16px;">
                        <div>بعد التسميد المخصص</div>
                        <div class="result-value" style="color:var(--success);">${potentialYield.toFixed(1)} <span style="font-size:1rem;">طن</span></div>
                        <div>≈ ${(potentialYield * 35000).toLocaleString()} دج</div>
                    </div>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100, (currentYield / (crop.maxYieldTonPerHa * area_ha) * 100))}%;"></div></div>
                <p>📈 الزيادة المتوقعة: <strong>+${gain.toFixed(1)} طن (+${gainPercent}%)</strong></p>
            </div>

            <div class="result-card">
                <h3>⚙️ تحليل العوامل المحددة (قانون ليبج)</h3>
                <div class="formula-box" style="direction:rtl; font-family:inherit;">Y = Y<sub>max</sub> × f(Nutrients) × f(Water) × f(Soil)</div>
                <table style="width:100%; margin-top:1rem;">
                    <tr style="background:var(--gray-light);"><th>العامل</th><th>القيمة</th><th>التأثير</th></tr>
                    <tr><td>🌱 العناصر الغذائية</td><td><strong>${(nutrientFactor * 100).toFixed(1)}%</strong></td><td>العنصر المحدد: ${limitingElement}</td></tr>
                    <tr><td>💧 كفاءة الماء</td><td><strong>${(waterFactor * 100).toFixed(1)}%</strong></td><td>المتاح: ${water_m3.toFixed(0)} م³ / المطلوب: ${waterNeed.toFixed(0)} م³</td></tr>
                    <tr><td>🧪 حالة التربة</td><td><strong>${(soilFactor * 100).toFixed(1)}%</strong></td><td>pH: ${pH} | EC: ${EC}</td></tr>
                </table>
            </div>

            <div class="result-card">
                <h3>📦 التسميد المخصص لسد الفجوة</h3>
                ${fertilizerGaps.length === 0 ? '<p>✅ تربتك متوازنة، لا تحتاج إلى سماد إضافي</p>' : `
                    <table style="width:100%"> <tr style="background:var(--gray-light);"><th>العنصر</th><th>العجز (كغ/هكتار)</th><th>السماد المناسب</th><th>الكمية المطلوبة</th><th>التكلفة</th></tr>
                    ${fertilizerGaps.map(g => ` <tr><td>${g.nutrient}</td><td>${g.deficit} كغ</td><td>${g.nutrient === 'N' ? 'يوريا 46%' : g.nutrient === 'P' ? 'سوبر فوسفات 18%' : 'كبريتات البوتاسيوم 50%'}</td><td>${g.fertilizerKg} كغ</td><td>${g.cost.toLocaleString()} دج</td></tr>`).join('')}
                    </table>
                    <div style="margin-top:1rem; padding:1rem; background:#e8f5e9; border-radius:12px;"><strong>💰 التكلفة الإجمالية للسماد: ${totalFertilizerCost.toLocaleString()} دج</strong></div>
                `}
                <button class="btn-primary" style="margin-top:1rem;" onclick="orderFertilizer('${crop.name}', '${JSON.stringify(fertilizerGaps)}')"><i class="fas fa-truck"></i> طلب السماد المخصص</button>
            </div>

            <div class="result-card">
                <h3>💡 توصيات لتحسين المردود</h3>
                <ul style="list-style:none;">
                    ${nutrientFactor < 0.8 ? `<li><i class="fas fa-flask" style="color:var(--warning);"></i> أضف ${fertilizerGaps.map(g=>`${g.fertilizerKg} كغ من ${g.nutrient==='N'?'يوريا':g.nutrient==='P'?'سوبر فوسفات':'كبريتات البوتاسيوم'}`).join(' و ')} لرفع معامل العناصر إلى 100%</li>` : ''}
                    ${waterFactor < 0.8 ? `<li><i class="fas fa-water" style="color:var(--info);"></i> وفر ${(waterNeed - water_m3).toFixed(0)} م³ إضافية من الماء لتحسين كفاءة الري</li>` : ''}
                    ${pH < crop.idealPH.min ? `<li><i class="fas fa-vial"></i> أضف ${((crop.idealPH.min - pH) * 2.5).toFixed(1)} طن/هكتار من الجير لرفع pH إلى المستوى المثالي (${crop.idealPH.min}-${crop.idealPH.max})</li>` : (pH > crop.idealPH.max ? `<li><i class="fas fa-vial"></i> أضف ${((pH - crop.idealPH.max) * 0.5).toFixed(1)} طن/هكتار من الكبريت لخفض pH إلى المستوى المثالي</li>` : '')}
                    ${EC > crop.idealEC.max ? `<li><i class="fas fa-tint"></i> غسل التربة بـ ${((EC - crop.idealEC.max) * 500).toFixed(0)} م³/هكتار من الماء العذب لتقليل الملوحة</li>` : ''}
                </ul>
            </div>
        </div>
    `;

    document.getElementById('resultsArea').innerHTML = resultsHtml;
    document.getElementById('resultsArea').style.display = 'block';
    document.getElementById('resultsArea').scrollIntoView({ behavior: 'smooth' });
}

function filterCrops() {
    let input = document.getElementById('cropName').value.toLowerCase();
    let list = document.getElementById('cropList');
    let filtered = Object.keys(CropDatabase).filter(c => c.toLowerCase().includes(input)).slice(0, 12);
    if (filtered.length > 0 && input) {
        list.style.display = 'block';
        list.innerHTML = filtered.map(c => `<div class="crop-item" onclick="selectCrop('${c}')">${c}</div>`).join('');
    } else { list.style.display = 'none'; }
}

function selectCrop(crop) {
    document.getElementById('cropName').value = crop;
    document.getElementById('cropList').style.display = 'none';
    let waterNeed = CropDatabase[crop].waterNeed_m3_per_ha;
    document.getElementById('cropWaterNeed').value = waterNeed;
}

function orderFertilizer(crop, gapsJson) {
    let gaps = JSON.parse(gapsJson);
    let msg = `طلب سماد مخصص لمحصول ${crop}:\n`;
    gaps.forEach(g => msg += `- ${g.nutrient}: ${g.fertilizerKg} كغ\n`);
    prompt("يمكنك نسخ هذا الطلب للتواصل معنا:", msg);
    showToast("📧 تم نسخ الطلب، يرجى التواصل معنا عبر صفحة الاتصال");
}

function showToast(msg) { let t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }

// تهيئة الاحتياج المائي
document.getElementById('cropName').addEventListener('change', () => {
    let crop = CropDatabase[document.getElementById('cropName').value];
    if (crop) document.getElementById('cropWaterNeed').value = crop.waterNeed_m3_per_ha;
});
</script>
