<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>AgriSmart Pro | Advanced Crop Growth Modeling</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        :root {
            --primary: #1a5f3e; --primary-dark: #0d3d26; --secondary: #ff9800;
            --success: #4caf50; --danger: #f44336; --warning: #ffc107; --info: #2196f3;
            --light: #f8fafc; --gray: #6c757d; --gray-light: #e9ecef;
            --radius: 20px; --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        body { background: var(--light); color: #1e1e2f; line-height: 1.5; }
        .navbar { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 0.8rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; flex-wrap: wrap; gap: 0.5rem; }
        .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.4rem; font-weight: 700; color: white; }
        .logo span { color: var(--secondary); }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 5%; }
        .card { background: white; border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); }
        .card-title { font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; border-right: 4px solid var(--secondary); padding-right: 0.8rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.3rem; font-weight: 600; }
        .form-control { width: 100%; padding: 0.8rem; border: 1px solid var(--gray-light); border-radius: 12px; font-size: 1rem; background: var(--light); }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .row-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
        .btn-primary { background: linear-gradient(135deg, var(--secondary), #f57c00); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 40px; font-weight: 600; cursor: pointer; width: 100%; font-size: 1rem; transition: transform 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); }
        .result-card { background: linear-gradient(135deg, #f5f5f5, #fff); border-radius: var(--radius); padding: 1.5rem; margin-top: 1rem; border: 1px solid var(--gray-light); }
        .result-value { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .progress-bar { height: 10px; background: var(--gray-light); border-radius: 10px; overflow: hidden; margin: 0.5rem 0; }
        .progress-fill { height: 100%; background: var(--secondary); border-radius: 10px; transition: width 0.5s; }
        .crop-list { max-height: 200px; overflow-y: auto; position: absolute; background: white; border: 1px solid var(--gray-light); border-radius: 12px; width: 100%; z-index: 100; display: none; box-shadow: var(--shadow); }
        .crop-item { padding: 0.5rem; cursor: pointer; border-bottom: 1px solid var(--gray-light); }
        .crop-item:hover { background: var(--gray-light); }
        .formula-box { background: var(--gray-light); padding: 1rem; border-radius: 12px; font-family: monospace; text-align: center; margin: 1rem 0; direction: ltr; }
        @media (max-width: 700px) { .row-2, .row-4 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo"><i class="fas fa-seedling"></i> Agri<span>Smart</span> Pro</div>
</div>

<div class="container">
    <div class="card">
        <div class="card-title"><i class="fas fa-microscope"></i> مدخلات المزرعة والتحليل المائي</div>
        
        <div class="row-2">
            <div class="form-group" style="position: relative;">
                <label><i class="fas fa-leaf"></i> نوع المحصول</label>
                <input type="text" id="cropName" class="form-control" placeholder="ابحث عن محصول..." oninput="filterCrops()" value="طماطم">
                <div id="cropList" class="crop-list"></div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-vector-square"></i> المساحة الإجمالية</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="number" id="area" class="form-control" value="1" oninput="updateDynamicWaterNeed()" style="flex:2;">
                    <select id="areaUnit" class="form-control" onchange="updateDynamicWaterNeed()" style="flex:1;">
                        <option value="hectare">هكتار</option>
                        <option value="m2">م²</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card-title" style="margin-top: 1rem;"><i class="fas fa-water"></i> الموارد المائية الحالية</div>
        <div class="row-2">
            <div class="form-group">
                <label>الماء المتوفر لديك حالياً</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="number" id="waterAmount" class="form-control" value="5000">
                    <select id="waterUnit" class="form-control"><option value="m3">م³</option><option value="liter">لتر</option></select>
                    <select id="waterPeriod" class="form-control" onchange="updateDynamicWaterNeed()">
                        <option value="season">في الموسم</option>
                        <option value="month">شهرياً</option>
                        <option value="week">أسبوعياً</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>الاحتياج المالي المثالي للمساحة المحددة</label>
                <input type="text" id="cropWaterNeedDisplay" class="form-control" readonly style="background:#e9ecef; color: var(--primary-dark); font-weight: bold;">
            </div>
        </div>

        <div class="card-title" style="margin-top: 1rem;"><i class="fas fa-flask"></i> تحليل التربة (ppm)</div>
        <div class="row-4">
            <div class="form-group"><label>N</label><input type="number" id="N" class="form-control" value="42"></div>
            <div class="form-group"><label>P</label><input type="number" id="P" class="form-control" value="28"></div>
            <div class="form-group"><label>K</label><input type="number" id="K" class="form-control" value="110"></div>
            <div class="form-group"><label>pH</label><input type="number" step="0.1" id="pH" class="form-control" value="6.8"></div>
        </div>

        <button class="btn-primary" onclick="calculateAdvancedYield()"><i class="fas fa-calculator"></i> بدء تحليل المردود</button>
    </div>

    <div id="resultsArea" style="display: none;"></div>
</div>

<script>
const CropDatabase = {
    "طماطم": { maxYieldTonPerHa: 80, waterNeed_m3_per_ha: 5000, nutrientPerTon: { N: 2.5, P: 0.8, K: 3.5 }, idealPH: { min: 6.0, max: 6.8 }, penaltyPH: 0.25 },
    "بطاطا": { maxYieldTonPerHa: 70, waterNeed_m3_per_ha: 4500, nutrientPerTon: { N: 2.2, P: 0.6, K: 4.5 }, idealPH: { min: 5.5, max: 6.5 }, penaltyPH: 0.30 },
    "قمح": { maxYieldTonPerHa: 12, waterNeed_m3_per_ha: 3500, nutrientPerTon: { N: 2.0, P: 0.5, K: 2.5 }, idealPH: { min: 6.0, max: 7.5 }, penaltyPH: 0.20 },
    "فلفل": { maxYieldTonPerHa: 60, waterNeed_m3_per_ha: 4500, nutrientPerTon: { N: 3.0, P: 1.0, K: 4.0 }, idealPH: { min: 6.2, max: 7.0 }, penaltyPH: 0.25 },
    "حمضيات": { maxYieldTonPerHa: 50, waterNeed_m3_per_ha: 8000, nutrientPerTon: { N: 2.0, P: 0.6, K: 3.0 }, idealPH: { min: 5.5, max: 6.5 }, penaltyPH: 0.25 }
};

// تحديث الاحتياج المائي المعروض فورياً بناءً على المساحة والفترة
function updateDynamicWaterNeed() {
    const cropName = document.getElementById('cropName').value;
    const crop = CropDatabase[cropName];
    const areaVal = parseFloat(document.getElementById('area').value) || 0;
    const areaUnit = document.getElementById('areaUnit').value;
    const period = document.getElementById('waterPeriod').value;

    if (crop) {
        let areaHa = areaUnit === 'hectare' ? areaVal : areaVal / 10000;
        let seasonalNeed = crop.waterNeed_m3_per_ha * areaHa;
        
        let displayNeed = seasonalNeed;
        if (period === 'month') displayNeed = seasonalNeed / 4; // افتراض موسم 4 أشهر
        if (period === 'week') displayNeed = seasonalNeed / 16;

        document.getElementById('cropWaterNeedDisplay').value = `${displayNeed.toLocaleString()} م³ (${period === 'season' ? 'للموسم' : (period === 'month' ? 'شهرياً' : 'أسبوعياً')})`;
    } else {
        document.getElementById('cropWaterNeedDisplay').value = "المحصول غير موجود";
    }
}

function calculateAdvancedYield() {
    const cropName = document.getElementById('cropName').value;
    const crop = CropDatabase[cropName];
    if (!crop) return alert("يرجى اختيار محصول من القائمة");

    // تحويل المساحة
    const areaVal = parseFloat(document.getElementById('area').value);
    const areaHa = document.getElementById('areaUnit').value === 'hectare' ? areaVal : areaVal / 10000;

    // تحويل الماء ومقارنة الاحتياج
    const waterProvided = parseFloat(document.getElementById('waterAmount').value);
    const period = document.getElementById('waterPeriod').value;
    const seasonalFactor = (period === 'month') ? 4 : (period === 'week' ? 16 : 1);
    const idealNeedForPeriod = (crop.waterNeed_m3_per_ha * areaHa) / seasonalFactor;
    
    // معامل الماء: تأثر المردود بنسبة التوفر (بمعامل أس 1.5 لتمثيل حساسية النبات)
    let waterRatio = Math.min(1.1, waterProvided / idealNeedForPeriod); 
    let waterFactor = Math.pow(Math.min(1, waterRatio), 1.5);

    // معامل العناصر (قانون ليبج المبسط)
    const N = parseFloat(document.getElementById('N').value) * 2.4;
    const nNeed = crop.nutrientPerTon.N * crop.maxYieldTonPerHa * areaHa;
    let nFactor = Math.min(1, N / nNeed);

    // حساب المردود
    let finalYield = crop.maxYieldTonPerHa * areaHa * waterFactor * nFactor;
    let potentialWithFullWater = crop.maxYieldTonPerHa * areaHa * 1 * nFactor;

    // عرض النتائج
    const res = document.getElementById('resultsArea');
    res.style.display = 'block';
    res.innerHTML = `
        <div class="card">
            <div class="card-title"><i class="fas fa-chart-pie"></i> تقرير محاكاة النمو</div>
            <div class="row-2">
                <div class="result-card" style="text-align:center">
                    <h4>المردود المتوقع حالياً</h4>
                    <div class="result-value">${finalYield.toFixed(2)} طن</div>
                    <p>بكفاءة مائية ${(waterFactor * 100).toFixed(1)}%</p>
                </div>
                <div class="result-card" style="text-align:center; border-right: 4px solid var(--info);">
                    <h4>المردود إذا توفر الري المثالي</h4>
                    <div class="result-value" style="color:var(--info)">${potentialWithFullWater.toFixed(2)} طن</div>
                    <p>تحتاج لزيادة ${(idealNeedForPeriod > waterProvided ? idealNeedForPeriod - waterProvided : 0).toFixed(0)} م³</p>
                </div>
            </div>

            <div class="result-card">
                <h3>💡 تحليل التوازن المائي</h3>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: ${Math.min(100, waterRatio * 100)}%; background: ${waterRatio < 0.8 ? 'var(--danger)' : 'var(--success)'}"></div>
                </div>
                <p>${waterRatio < 1 
                    ? `⚠️ تنبيه: نقص الماء بمقدار ${(100 - waterRatio * 100).toFixed(0)}% يقلل الإنتاج بشكل غير خطي.` 
                    : `✅ ممتاز: كمية الماء المتاحة تغطي احتياجات الـ ${cropName} بالكامل.`}</p>
            </div>
        </div>
    `;
    res.scrollIntoView({behavior:'smooth'});
}

function filterCrops() {
    let input = document.getElementById('cropName').value.toLowerCase();
    let list = document.getElementById('cropList');
    let filtered = Object.keys(CropDatabase).filter(c => c.includes(input));
    list.style.display = filtered.length ? 'block' : 'none';
    list.innerHTML = filtered.map(c => `<div class="crop-item" onclick="selectCrop('${c}')">${c}</div>`).join('');
}

function selectCrop(c) {
    document.getElementById('cropName').value = c;
    document.getElementById('cropList').style.display = 'none';
    updateDynamicWaterNeed();
}

// تهيئة أولية عند التشغيل
updateDynamicWaterNeed();
</script>
</body>
</html>
