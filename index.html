<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriSmart Pro | المساعد الزراعي الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a5f3e; --secondary: #ff9800; --success: #4caf50;
            --light: #f8fafc; --white: #ffffff; --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background: var(--light); color: #333; }
        
        /* Navigation */
        .navbar { background: var(--primary); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; color: white; sticky: top; }
        .logo { font-size: 1.5rem; font-weight: 700; }
        .logo span { color: var(--secondary); }
        .lang-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; margin-left: 5px; }
        .lang-btn.active { background: var(--secondary); }

        .container { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
        .card { background: var(--white); border-radius: 15px; padding: 2rem; box-shadow: var(--shadow); margin-bottom: 1.5rem; }
        .card-title { color: var(--primary); margin-bottom: 1.5rem; border-bottom: 2px solid var(--light); padding-bottom: 0.5rem; }

        /* Form Styling */
        .grid-inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        .form-control { width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .form-control:focus { border-color: var(--primary); }

        .btn-calc { background: var(--secondary); color: white; border: none; width: 100%; padding: 1rem; border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-calc:hover { background: #e68a00; }

        /* Results Styling */
        .results-area { display: none; margin-top: 2rem; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .res-card { padding: 1.5rem; border-radius: 12px; text-align: center; color: white; }
        .res-current { background: #607d8b; }
        .res-potential { background: var(--success); }
        .res-val { font-size: 2rem; font-weight: 800; display: block; }

        table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: white; }
        th, td { padding: 1rem; border: 1px solid #eee; text-align: center; }
        th { background: var(--primary); color: white; }

        .soil-badge { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; color: white; }
        .bg-good { background: #4caf50; } .bg-med { background: #ff9800; } .bg-low { background: #f44336; }
        
        .crop-list { position: absolute; background: white; border: 1px solid #ddd; width: 100%; z-index: 10; max-height: 200px; overflow-y: auto; display: none; }
        .crop-item { padding: 0.8rem; cursor: pointer; border-bottom: 1px solid #eee; }
        .crop-item:hover { background: #f1f1f1; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo"><i class="fas fa-seedling"></i> Agri<span>Smart</span></div>
    <div>
        <button class="lang-btn" onclick="setLang('ar')">AR</button>
        <button class="lang-btn" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <h2 class="card-title" id="t-soil-analysis">تحليل التربة واختيار المحصول</h2>
        
        <div class="form-group" style="position: relative;">
            <label id="t-crop-select">اختر المحصول</label>
            <input type="text" id="cropInput" class="form-control" placeholder="ابحث عن محصول..." oninput="filterCrops()">
            <div id="cropList" class="crop-list"></div>
        </div>

        <div class="grid-inputs">
            <div class="form-group"><label>N (ppm)</label><input type="number" id="N" class="form-control" value="40"></div>
            <div class="form-group"><label>P (ppm)</label><input type="number" id="P" class="form-control" value="25"></div>
            <div class="form-group"><label>K (ppm)</label><input type="number" id="K" class="form-control" value="150"></div>
            <div class="form-group"><label>pH</label><input type="number" step="0.1" id="pH" class="form-control" value="7.0"></div>
            <div class="form-group"><label>EC (mS/cm)</label><input type="number" step="0.1" id="EC" class="form-control" value="1.2"></div>
            <div class="form-group"><label id="t-area">المساحة (m²)</label><input type="number" id="area" class="form-control" value="1000"></div>
        </div>

        <button class="btn-calc" onclick="runEngine()" id="t-btn-calc">بدء التحليل والحساب</button>
    </div>

    <div id="resultsArea" class="results-area">
        </div>
</div>

<script>
    // 1. قاعدة بيانات المحاصيل (هيكل قابل للتوسع لـ 200 صنف)
    const crops = {
        "Tomato": { name: {ar:"طماطم", fr:"Tomate", en:"Tomato"}, nTon: 2.5, pTon: 1.2, kTon: 4.5, maxYieldHectare: 70, optPH: [6.0, 7.0], maxEC: 2.5 },
        "Potato": { name: {ar:"بطاطس", fr:"Pomme de terre", en:"Potato"}, nTon: 3.5, pTon: 1.5, kTon: 5.5, maxYieldHectare: 45, optPH: [5.5, 6.5], maxEC: 2.0 },
        "Wheat": { name: {ar:"قمح", fr:"Blé", en:"Wheat"}, nTon: 25, pTon: 12, kTon: 18, maxYieldHectare: 6, optPH: [6.0, 7.5], maxEC: 4.0 },
        "Orange": { name: {ar:"برتقال", fr:"Orange", en:"Orange"}, nTon: 1.8, pTon: 0.5, kTon: 2.5, maxYieldHectare: 40, optPH: [6.0, 7.0], maxEC: 2.2 }
    };

    let currentLang = 'ar';
    let selectedCropKey = "Tomato";

    const ui = {
        ar: { soil_analysis: "تحليل التربة واختيار المحصول", crop_select: "اختر المحصول", area: "المساحة (م²)", btn_calc: "بدء التحليل والحساب", current: "المردود الحالي", potential: "المردود المستهدف", ton: "طن", element: "العنصر", need: "الكمية المطلوبة (كجم)", status: "حالة التربة" },
        fr: { soil_analysis: "Analyse du Sol", crop_select: "Choisir la culture", area: "Surface (m²)", btn_calc: "Calculer le rendement", current: "Rendement Actuel", potential: "Rendement Cible", ton: "Tonne", element: "Élément", need: "Besoin (kg)", status: "État du sol" },
        en: { soil_analysis: "Soil Analysis", crop_select: "Select Crop", area: "Area (m²)", btn_calc: "Calculate Yield", current: "Current Yield", potential: "Target Yield", ton: "Ton", element: "Element", need: "Requirement (kg)", status: "Soil Status" }
    };

    function setLang(lang) {
        currentLang = lang;
        document.getElementById('t-soil-analysis').innerText = ui[lang].soil_analysis;
        document.getElementById('t-crop-select').innerText = ui[lang].crop_select;
        document.getElementById('t-area').innerText = ui[lang].area;
        document.getElementById('t-btn-calc').innerText = ui[lang].btn_calc;
        if(document.getElementById('resultsArea').style.display === 'block') runEngine();
    }

    function filterCrops() {
        const val = document.getElementById('cropInput').value.toLowerCase();
        const list = document.getElementById('cropList');
        list.innerHTML = "";
        list.style.display = "block";
        Object.keys(crops).forEach(key => {
            if(crops[key].name[currentLang].toLowerCase().includes(val)) {
                const div = document.createElement('div');
                div.className = "crop-item";
                div.innerText = crops[key].name[currentLang];
                div.onclick = () => {
                    document.getElementById('cropInput').value = crops[key].name[currentLang];
                    selectedCropKey = key;
                    list.style.display = "none";
                };
                list.appendChild(div);
            }
        });
    }

    function runEngine() {
        const crop = crops[selectedCropKey];
        const soil = {
            n: parseFloat(document.getElementById('N').value) || 0,
            p: parseFloat(document.getElementById('P').value) || 0,
            k: parseFloat(document.getElementById('K').value) || 0,
            ph: parseFloat(document.getElementById('pH').value) || 7,
            ec: parseFloat(document.getElementById('EC').value) || 0
        };
        const areaM2 = parseFloat(document.getElementById('area').value) || 1000;
        const areaHectare = areaM2 / 10000;

        // 1. تحويل ppm إلى كجم/هكتار (معامل 2.4 لعمق 20سم)
        // الفسفور والبوتاسيوم لهما معامل إتاحة (Availability Factor)
        const available = {
            n: soil.n * 2.4,
            p: soil.p * 2.4 * 0.25, // 25% متاح
            k: soil.k * 2.4 * 0.50  // 50% متاح
        };

        // 2. معامل خفض المردود (الحموضة والملوحة)
        let penalty = 1.0;
        if(soil.ph < crop.optPH[0]) penalty -= (crop.optPH[0] - soil.ph) * 0.2;
        if(soil.ph > crop.optPH[1]) penalty -= (soil.ph - crop.optPH[1]) * 0.2;
        if(soil.ec > crop.maxEC) penalty -= (soil.ec - crop.maxEC) * 0.15;
        penalty = Math.max(0.1, penalty);

        // 3. قانون الحد الأدنى (Liebig's Law)
        const potN = available.n / crop.nTon;
        const potP = available.p / crop.pTon;
        const potK = available.k / crop.kTon;
        
        let currentYieldPerHectare = Math.min(potN, potP, potK, crop.maxYieldHectare) * penalty;
        let targetYieldPerHectare = crop.maxYieldHectare * penalty;

        // 4. حساب الاحتياجات السمادية (مع مراعاة كفاءة السماد 50%)
        const calcDeficit = (needed, avail) => Math.max(0, (needed - avail) * 2); 
        const fertilizer = {
            n: calcDeficit(targetYieldPerHectare * crop.nTon, available.n) * areaHectare,
            p: calcDeficit(targetYieldPerHectare * crop.pTon, available.p) * areaHectare,
            k: calcDeficit(targetYieldPerHectare * crop.kTon, available.k) * areaHectare
        };

        displayResults(currentYieldPerHectare * areaHectare, targetYieldPerHectare * areaHectare, fertilizer, soil, crop);
    }

    function displayResults(cur, tar, fert, soil, crop) {
        const resDiv = document.getElementById('resultsArea');
        resDiv.style.display = 'block';
        const l = ui[currentLang];

        resDiv.innerHTML = `
            <div class="result-grid">
                <div class="res-card res-current">
                    <span>${l.current}</span>
                    <strong class="res-val">${(cur/1000).toFixed(2)} ${l.ton}</strong>
                </div>
                <div class="res-card res-potential">
                    <span>${l.potential}</span>
                    <strong class="res-val">${(tar/1000).toFixed(2)} ${l.ton}</strong>
                </div>
            </div>

            <div class="card" style="margin-top:1.5rem">
                <h3>${l.need}</h3>
                <table>
                    <thead><tr><th>${l.element}</th><th>${l.need}</th><th>Source</th></tr></thead>
                    <tbody>
                        <tr><td>N</td><td>${fert.n.toFixed(1)}</td><td>Urea 46%</td></tr>
                        <tr><td>P</td><td>${fert.p.toFixed(1)}</td><td>DAP / TSP</td></tr>
                        <tr><td>K</td><td>${fert.k.toFixed(1)}</td><td>Sulfate de Potassium</td></tr>
                    </tbody>
                </table>
            </div>
        `;
        window.scrollTo({ top: resDiv.offsetTop - 100, behavior: 'smooth' });
    }
    
    // إغلاق قائمة المحاصيل عند الضغط خارجها
    window.onclick = (e) => { if(!e.target.matches('#cropInput')) document.getElementById('cropList').style.display='none'; }
</script>

</body>
</html>
